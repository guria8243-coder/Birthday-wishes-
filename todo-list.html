<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: white;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  max-width: 500px;
  width: 100%;
  padding: 30px;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  color: #333;
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.header p {
  color: #999;
  font-size: 0.95rem;
}

.input-section {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
}

#todoInput {
  flex: 1;
  padding: 12px 15px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 1rem;
  transition: border-color 0.3s;
}

#todoInput:focus {
  outline: none;
  border-color: #667eea;
}

#addBtn {
  padding: 12px 25px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s;
}

#addBtn:hover {
  transform: translateY(-2px);
}

#addBtn:active {
  transform: translateY(0);
}

.filter-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 15px;
  border: 2px solid #e0e0e0;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 0.9rem;
}

.filter-btn.active {
  background: #667eea;
  color: white;
  border-color: #667eea;
}

.todo-list {
  list-style: none;
  max-height: 400px;
  overflow-y: auto;
}

.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px;
  background: #f9f9f9;
  border-radius: 8px;
  margin-bottom: 10px;
  transition: all 0.3s;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(-20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.todo-item:hover {
  background: #f0f0f0;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.todo-item.completed {
  opacity: 0.6;
}

.todo-item.completed .todo-text {
  text-decoration: line-through;
  color: #999;
}

.checkbox {
  width: 20px;
  height: 20px;
  cursor: pointer;
  accent-color: #667eea;
}

.todo-text {
  flex: 1;
  color: #333;
  font-size: 1rem;
  word-break: break-word;
}

.todo-actions {
  display: flex;
  gap: 8px;
}

.delete-btn {
  background: #ff6b6b;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: background 0.3s;
}

.delete-btn:hover {
  background: #ff5252;
}

.edit-btn {
  background: #4ecdc4;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: background 0.3s;
}

.edit-btn:hover {
  background: #45b7aa;
}

.stats {
  display: flex;
  justify-content: space-around;
  gap: 10px;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 2px solid #e0e0e0;
}

.stat {
  text-align: center;
}

.stat-number {
  font-size: 1.8rem;
  font-weight: bold;
  color: #667eea;
}

.stat-label {
  font-size: 0.85rem;
  color: #999;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #999;
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 10px;
}

.clear-all-btn {
  width: 100%;
  padding: 12px;
  background: #ff6b6b;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 15px;
  transition: background 0.3s;
}

.clear-all-btn:hover {
  background: #ff5252;
}

.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
}

.modal.active {
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
  max-width: 400px;
  width: 90%;
}

.modal-content h2 {
  margin-bottom: 20px;
  color: #333;
}

.modal-content input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 1rem;
  margin-bottom: 15px;
}

.modal-content input:focus {
  outline: none;
  border-color: #667eea;
}

.modal-buttons {
  display: flex;
  gap: 10px;
}

.modal-buttons button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
}

.modal-buttons .save-btn {
  background: #667eea;
  color: white;
}

.modal-buttons .save-btn:hover {
  background: #5568d3;
}

.modal-buttons .cancel-btn {
  background: #e0e0e0;
  color: #333;
}

.modal-buttons .cancel-btn:hover {
  background: #d0d0d0;
}

@media (max-width: 600px) {
  .container {
    padding: 20px;
  }

  .header h1 {
    font-size: 2rem;
  }

  .input-section {
    flex-direction: column;
  }

  .stats {
    flex-direction: row;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>✓ To-Do List</h1>
    <p>Stay organized and track your tasks</p>
  </div>

  <div class="input-section">
    <input 
      type="text" 
      id="todoInput" 
      placeholder="Add a new task..." 
      autocomplete="off"
    >
    <button id="addBtn">Add</button>
  </div>

  <div class="filter-buttons">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <ul class="todo-list" id="todoList"></ul>

  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">📝</div>
    <p>No tasks yet. Add one to get started!</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="activeCount">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="completedCount">0</div>
      <div class="stat-label">Completed</div>
    </div>
  </div>

  <button class="clear-all-btn" id="clearAllBtn">Clear All Tasks</button>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h2>Edit Task</h2>
    <input type="text" id="editInput" placeholder="Edit your task...">
    <div class="modal-buttons">
      <button class="save-btn" id="saveEditBtn">Save</button>
      <button class="cancel-btn" id="cancelEditBtn">Cancel</button>
    </div>
  </div>
</div>

<script>
// DOM Elements
const todoInput = document.getElementById('todoInput');
const addBtn = document.getElementById('addBtn');
const todoList = document.getElementById('todoList');
const emptyState = document.getElementById('emptyState');
const filterBtns = document.querySelectorAll('.filter-btn');
const clearAllBtn = document.getElementById('clearAllBtn');
const editModal = document.getElementById('editModal');
const editInput = document.getElementById('editInput');
const saveEditBtn = document.getElementById('saveEditBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');

// State
let todos = [];
let currentFilter = 'all';
let editingId = null;

// Local Storage Key
const STORAGE_KEY = 'todos';

// Load todos from local storage
function loadTodos() {
  const saved = localStorage.getItem(STORAGE_KEY);
  todos = saved ? JSON.parse(saved) : [];
}

// Save todos to local storage
function saveTodos() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
}

// Add new todo
function addTodo() {
  const text = todoInput.value.trim();
  if (text === '') {
    alert('Please enter a task!');
    return;
  }

  const newTodo = {
    id: Date.now(),
    text: text,
    completed: false,
    createdAt: new Date().toLocaleString()
  };

  todos.push(newTodo);
  saveTodos();
  todoInput.value = '';
  render();
}

// Delete todo
function deleteTodo(id) {
  if (confirm('Are you sure you want to delete this task?')) {
    todos = todos.filter(todo => todo.id !== id);
    saveTodos();
    render();
  }
}

// Toggle todo completion
function toggleTodo(id) {
  const todo = todos.find(t => t.id === id);
  if (todo) {
    todo.completed = !todo.completed;
    saveTodos();
    render();
  }
}

// Open edit modal
function openEditModal(id) {
  editingId = id;
  const todo = todos.find(t => t.id === id);
  if (todo) {
    editInput.value = todo.text;
    editModal.classList.add('active');
    editInput.focus();
  }
}

// Save edited todo
function saveEdit() {
  const text = editInput.value.trim();
  if (text === '') {
    alert('Task cannot be empty!');
    return;
  }

  const todo = todos.find(t => t.id === editingId);
  if (todo) {
    todo.text = text;
    saveTodos();
    render();
    closeEditModal();
  }
}

// Close edit modal
function closeEditModal() {
  editModal.classList.remove('active');
  editingId = null;
  editInput.value = '';
}

// Clear all todos
function clearAllTodos() {
  if (confirm('Are you sure you want to delete all tasks?')) {
    todos = [];
    saveTodos();
    render();
  }
}

// Filter todos
function getFilteredTodos() {
  switch (currentFilter) {
    case 'active':
      return todos.filter(todo => !todo.completed);
    case 'completed':
      return todos.filter(todo => todo.completed);
    default:
      return todos;
  }
}

// Update stats
function updateStats() {
  const total = todos.length;
  const active = todos.filter(t => !t.completed).length;
  const completed = todos.filter(t => t.completed).length;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('activeCount').textContent = active;
  document.getElementById('completedCount').textContent = completed;
}

// Render todos
function render() {
  const filteredTodos = getFilteredTodos();

  todoList.innerHTML = '';

  if (filteredTodos.length === 0) {
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';
    filteredTodos.forEach(todo => {
      const li = document.createElement('li');
      li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
      li.innerHTML = `
        <input 
          type="checkbox" 
          class="checkbox" 
          ${todo.completed ? 'checked' : ''} 
          onchange="toggleTodo(${todo.id})"
        >
        <span class="todo-text">${escapeHtml(todo.text)}</span>
        <div class="todo-actions">
          <button class="edit-btn" onclick="openEditModal(${todo.id})">Edit</button>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
        </div>
      `;
      todoList.appendChild(li);
    });
  }

  updateStats();
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Event listeners
addBtn.addEventListener('click', addTodo);
todoInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    addTodo();
  }
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

clearAllBtn.addEventListener('click', clearAllTodos);
saveEditBtn.addEventListener('click', saveEdit);
cancelEditBtn.addEventListener('click', closeEditModal);

editInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    saveEdit();
  }
  if (e.key === 'Escape') {
    closeEditModal();
  }
});

// Initialize
loadTodos();
render();
</script>

</body>
</html>
